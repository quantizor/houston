name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  SCHEME: Houston
  APP_NAME: Houston
  ARCHIVE_PATH: build/Houston.xcarchive
  EXPORT_PATH: build/export

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          echo "$CERTIFICATE_P12" | base64 --decode > cert.p12
          security import cert.p12 -k "$KEYCHAIN" -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productsign
          rm cert.p12

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -scheme "$SCHEME" -quiet

      - name: Archive
        run: |
          xcodebuild archive \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "$ARCHIVE_PATH" \
            MARKETING_VERSION="$VERSION" \
            -quiet

      - name: Export
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          # Override team ID from secrets for CI
          sed "s/98C3ZR73ZM/$TEAM_ID/" ExportOptions.plist > build/ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist build/ExportOptions.plist

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          # Create zip for notarization
          ditto -c -k --keepParent "$EXPORT_PATH/$APP_NAME.app" build/Houston-notarize.zip

          xcrun notarytool submit build/Houston-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait

          xcrun stapler staple "$EXPORT_PATH/$APP_NAME.app"

      - name: Create DMG
        run: |
          DMG_NAME="Houston-${VERSION}-$(uname -m).dmg"
          DMG_PATH="build/$DMG_NAME"
          STAGING="build/dmg-staging"

          mkdir -p "$STAGING"
          cp -R "$EXPORT_PATH/$APP_NAME.app" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create -volname "Houston" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$DMG_PATH"

          # Notarize the DMG
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait

          xcrun stapler staple "$DMG_PATH"

          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" "$DMG_PATH" \
            --title "Houston $VERSION" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
